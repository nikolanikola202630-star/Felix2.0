name: CI/CD Pipeline - Full Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Ежедневная проверка в 3:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18.x'

jobs:
  # ============================================
  # 1. Проверка кода и тесты
  # ============================================
  test:
    name: Tests & Quality Checks
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run type check
        run: npm run type-check --if-present
        continue-on-error: true
      
      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      
      - name: Run integration tests
        run: npm run test:integration --if-present
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      
      - name: Generate coverage report
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-${{ matrix.node-version }}
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 30

  # ============================================
  # 2. Проверка безопасности
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ============================================
  # 3. Проверка базы данных
  # ============================================
  database:
    name: Database Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check migrations
        run: npm run migrate:status
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      
      - name: Validate schema
        run: |
          npm run db:validate --if-present
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      
      - name: Test database connection
        run: |
          node -e "
          import('pg').then(({ default: pg }) => {
            const client = new pg.Client({ connectionString: process.env.DATABASE_URL });
            client.connect()
              .then(() => { console.log('✅ Database connected'); client.end(); })
              .catch(err => { console.error('❌ Database error:', err); process.exit(1); });
          });
          "
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  # ============================================
  # 4. Backup базы данных
  # ============================================
  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      
      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          BACKUP_FILE="backup-$(date +%Y%m%d-%H%M%S).sql"
          pg_dump $DATABASE_URL > $BACKUP_FILE
          gzip $BACKUP_FILE
          echo "BACKUP_FILE=${BACKUP_FILE}.gz" >> $GITHUB_ENV
      
      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: database-backup
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
      
      - name: Upload to S3 (optional)
        if: secrets.AWS_S3_BUCKET != ''
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl private
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: ${{ env.BACKUP_FILE }}
      
      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚨 Database backup failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ============================================
  # 5. Деплой в Vercel
  # ============================================
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test, security, database]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ github.event.inputs.environment || 'production' }} --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy ${{ github.ref == 'refs/heads/main' && '--prod' || '--prebuilt' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
      
      - name: Comment PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Deployed to: ${{ env.DEPLOYMENT_URL }}`
            })

  # ============================================
  # 6. Применение миграций
  # ============================================
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run migrations
        run: npm run migrate:up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Verify migrations
        run: npm run migrate:status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ============================================
  # 7. Smoke tests после деплоя
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy, migrate]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Wait for deployment
        run: sleep 30
      
      - name: Test webhook endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://felix-black.vercel.app/api/webhook)
          if [ $RESPONSE -eq 200 ]; then
            echo "✅ Webhook endpoint is healthy"
          else
            echo "❌ Webhook endpoint returned $RESPONSE"
            exit 1
          fi
      
      - name: Test database connection
        run: |
          node -e "
          import('pg').then(({ default: pg }) => {
            const client = new pg.Client({ connectionString: process.env.DATABASE_URL });
            client.connect()
              .then(() => client.query('SELECT 1'))
              .then(() => { console.log('✅ Database is healthy'); client.end(); })
              .catch(err => { console.error('❌ Database error:', err); process.exit(1); });
          });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Test Redis connection
        run: |
          node -e "
          import('@vercel/kv').then(({ kv }) => {
            kv.set('health-check', 'ok', { ex: 60 })
              .then(() => kv.get('health-check'))
              .then(val => {
                if (val === 'ok') {
                  console.log('✅ Redis is healthy');
                } else {
                  throw new Error('Redis health check failed');
                }
              })
              .catch(err => { console.error('❌ Redis error:', err); process.exit(1); });
          });
          "
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
      
      - name: Test Sentry integration
        run: |
          curl -X POST https://sentry.io/api/0/projects/${{ secrets.SENTRY_ORG }}/${{ secrets.SENTRY_PROJECT }}/events/ \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"message":"CI/CD health check","level":"info"}'

  # ============================================
  # 8. Очистка кэша
  # ============================================
  cache-warmup:
    name: Cache Warmup
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Warm up cache
        run: |
          # Предварительная загрузка популярных данных в кэш
          curl -X POST https://felix-black.vercel.app/api/admin/cache-warmup \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json"

  # ============================================
  # 9. Уведомления
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, migrate, smoke-tests]
    if: always()
    
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🚀 Deployment ${{ job.status }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Notify Telegram
        if: success()
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_ID }}" \
            -d "text=✅ Felix Bot deployed successfully!%0ACommit: ${{ github.sha }}%0AAuthor: ${{ github.actor }}"
      
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated release from CI/CD pipeline
            
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            
            Changes: See commit history
          draft: false
          prerelease: false
