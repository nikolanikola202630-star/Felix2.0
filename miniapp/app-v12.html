<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Felix Academy V12</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Стили -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="css/flagship-premium.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Контейнер приложения */
    #app {
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Loader */
    .app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      z-index: 9999;
      transition: opacity var(--transition-base);
    }

    .app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--primary);
      border-radius: var(--radius-full);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Навигация */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-elevated);
      backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: var(--space-2) 0 calc(var(--space-2) + env(safe-area-inset-bottom));
      z-index: var(--z-fixed);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      text-decoration: none;
      color: var(--text-secondary);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      padding: var(--space-2) var(--space-3);
      transition: all var(--transition-base);
      position: relative;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    .nav-item:hover {
      background: var(--primary-alpha-10);
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 3px;
      background: var(--primary);
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      box-shadow: 0 2px 8px var(--primary-alpha-20);
    }

    .nav-icon {
      font-size: 24px;
      transition: transform var(--transition-spring);
    }

    .nav-item.active .nav-icon {
      transform: scale(1.1);
    }

    /* Контент страницы */
    .page-content {
      max-width: 600px;
      margin: 0 auto;
      padding: var(--space-4);
      animation: fadeIn var(--transition-base);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Кнопки */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-lg);
      border: none;
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      cursor: pointer;
      transition: all var(--transition-base);
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-hover);
    }

    /* Карточки */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      transition: all var(--transition-base);
    }

    .card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    /* Утилиты */
    .hidden {
      display: none !important;
    }

    .text-center {
      text-align: center;
    }

    .mt-4 {
      margin-top: var(--space-4);
    }

    .mb-4 {
      margin-bottom: var(--space-4);
    }
  </style>
</head>
<body>
  <!-- Loader -->
  <div class="app-loader" id="appLoader">
    <div class="loader-spinner"></div>
  </div>

  <!-- Приложение -->
  <div id="app"></div>

  <!-- Навигация -->
  <nav class="bottom-nav">
    <a class="nav-item active" data-page="home" onclick="FelixApp.navigate('home')">
      <div class="nav-icon">🏠</div>
      <div>Главная</div>
    </a>
    <a class="nav-item" data-page="academy" onclick="FelixApp.navigate('academy')">
      <div class="nav-icon">🎓</div>
      <div>Академия</div>
    </a>
    <a class="nav-item" data-page="community" onclick="FelixApp.navigate('community')">
      <div class="nav-icon">👥</div>
      <div>Сообщество</div>
    </a>
    <a class="nav-item" data-page="settings" onclick="FelixApp.navigate('settings')">
      <div class="nav-icon">⚙️</div>
      <div>Настройки</div>
    </a>
    <a class="nav-item" data-page="profile" onclick="FelixApp.navigate('profile')">
      <div class="nav-icon">👤</div>
      <div>Профиль</div>
    </a>
  </nav>

  <!-- Core модули -->
  <script src="core/state.js"></script>
  <script src="core/utils.js"></script>
  <script src="core/router.js"></script>
  <script src="core/api.js"></script>

  <!-- Главное приложение -->
  <script>
    // Felix Academy V12 - Main Application
    class FelixApp {
      constructor() {
        this.init();
      }

      async init() {
        console.log('🚀 Felix Academy V12 - Starting...');

        // Инициализация Telegram
        FelixUtils.initTelegram();

        // Загрузка пользователя
        const user = FelixUtils.getUser();
        FelixState.set('user', user);

        // Регистрация маршрутов
        this.registerRoutes();

        // Загрузка начальных данных
        await this.loadInitialData();

        // Скрыть loader
        setTimeout(() => {
          document.getElementById('appLoader').classList.add('hidden');
        }, 500);

        // Загрузить главную страницу
        this.navigate('home');

        console.log('✅ Felix Academy V12 - Ready!');
      }

      registerRoutes() {
        FelixRouter.register('home', () => this.renderHome());
        FelixRouter.register('academy', () => this.renderAcademy());
        FelixRouter.register('community', () => this.renderCommunity());
        FelixRouter.register('settings', () => this.renderSettings());
        FelixRouter.register('profile', () => this.renderProfile());
      }

      async loadInitialData() {
        try {
          // Загрузка курсов
          const coursesData = await FelixAPI.get('/courses-full', { cache: true });
          if (coursesData.success) {
            FelixState.set('courses', coursesData.courses);
          }

          // Загрузка статистики
          const user = FelixState.get('user');
          const statsData = await FelixAPI.get(`/stats?user_id=${user.id}`, { cache: true });
          if (statsData.success) {
            FelixState.set('stats', statsData.stats);
          }
        } catch (error) {
          console.error('Failed to load initial data:', error);
        }
      }

      navigate(page) {
        // Обновить активную навигацию
        document.querySelectorAll('.nav-item').forEach(item => {
          item.classList.remove('active');
          if (item.dataset.page === page) {
            item.classList.add('active');
          }
        });

        // Haptic feedback
        FelixUtils.haptic.light();

        // Навигация через роутер
        FelixRouter.navigate(page);
      }

      renderHome() {
        const user = FelixState.get('user');
        const stats = FelixState.get('stats') || {};
        
        document.getElementById('app').innerHTML = `
          <div class="page-content">
            <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--space-6);">
              Привет, ${user.first_name}! 👋
            </h1>
            
            <div class="card mb-4">
              <h2 style="font-size: var(--text-xl); font-weight: var(--font-semibold); margin-bottom: var(--space-3);">
                📊 Твоя статистика
              </h2>
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3);">
                <div class="text-center">
                  <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--primary);">
                    ${stats.courses_purchased || 0}
                  </div>
                  <div style="font-size: var(--text-sm); color: var(--text-secondary);">Курсов</div>
                </div>
                <div class="text-center">
                  <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--success);">
                    ${stats.hours_learned || 0}ч
                  </div>
                  <div style="font-size: var(--text-sm); color: var(--text-secondary);">Обучения</div>
                </div>
                <div class="text-center">
                  <div style="font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--warning);">
                    ${stats.bonus_balance || 0}₽
                  </div>
                  <div style="font-size: var(--text-sm); color: var(--text-secondary);">Бонусов</div>
                </div>
              </div>
            </div>

            <div class="card">
              <h2 style="font-size: var(--text-xl); font-weight: var(--font-semibold); margin-bottom: var(--space-3);">
                🚀 Быстрые действия
              </h2>
              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3);">
                <button class="btn btn-primary" onclick="FelixApp.navigate('academy')">
                  🎓 Академия
                </button>
                <button class="btn btn-secondary" onclick="FelixApp.navigate('community')">
                  👥 Сообщество
                </button>
              </div>
            </div>
          </div>
        `;
      }

      renderAcademy() {
        document.getElementById('app').innerHTML = `
          <div class="page-content">
            <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--space-6);">
              🎓 Академия
            </h1>
            <div class="card text-center">
              <div style="font-size: 64px; margin-bottom: var(--space-4);">📚</div>
              <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
                Академия загружается...
              </p>
              <button class="btn btn-primary" onclick="FelixApp.navigate('home')">
                ← Назад на главную
              </button>
            </div>
          </div>
        `;
      }

      renderCommunity() {
        document.getElementById('app').innerHTML = `
          <div class="page-content">
            <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--space-6);">
              👥 Сообщество
            </h1>
            <div class="card text-center">
              <div style="font-size: 64px; margin-bottom: var(--space-4);">💬</div>
              <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
                Сообщество загружается...
              </p>
              <button class="btn btn-primary" onclick="FelixApp.navigate('home')">
                ← Назад на главную
              </button>
            </div>
          </div>
        `;
      }

      renderSettings() {
        document.getElementById('app').innerHTML = `
          <div class="page-content">
            <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--space-6);">
              ⚙️ Настройки
            </h1>
            <div class="card text-center">
              <div style="font-size: 64px; margin-bottom: var(--space-4);">🔧</div>
              <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
                Настройки загружаются...
              </p>
              <button class="btn btn-primary" onclick="FelixApp.navigate('home')">
                ← Назад на главную
              </button>
            </div>
          </div>
        `;
      }

      renderProfile() {
        const user = FelixState.get('user');
        
        document.getElementById('app').innerHTML = `
          <div class="page-content">
            <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); margin-bottom: var(--space-6);">
              👤 Профиль
            </h1>
            <div class="card">
              <div style="text-align: center; margin-bottom: var(--space-4);">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto var(--space-3);">
                  ${user.first_name[0].toUpperCase()}
                </div>
                <h2 style="font-size: var(--text-2xl); font-weight: var(--font-bold);">
                  ${user.first_name}
                </h2>
                <p style="color: var(--text-secondary);">@${user.username || 'user'}</p>
              </div>
              <button class="btn btn-primary" style="width: 100%;" onclick="FelixApp.navigate('home')">
                ← Назад на главную
              </button>
            </div>
          </div>
        `;
      }
    }

    // Инициализация приложения
    window.FelixApp = new FelixApp();
  </script>
</body>
</html>
