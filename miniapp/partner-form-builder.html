<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конструктор Анкеты - Felix Academy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/flagship-premium.css?v=9.1">
  <style>
    .form-builder {
      padding: 20px;
    }
    .field-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .field-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .field-number {
      font-size: 18px;
      font-weight: 600;
      color: #667eea;
    }
    .btn-delete {
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 8px;
      color: #ef4444;
      cursor: pointer;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .checkbox-group input[type="checkbox"] {
      width: auto;
    }
    .btn-add-field {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .btn-save-all {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .options-input {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <button class="back-btn" onclick="window.history.back()">←</button>
      <h1>📝 Конструктор Анкеты</h1>
    </header>

    <div class="form-builder">
      <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">
        Создайте анкету для сбора данных от пользователей перед доступом к академии.
      </p>

      <div id="fieldsList"></div>

      <button class="btn-add-field" onclick="addField()">
        ➕ Добавить поле
      </button>

      <button class="btn-save-all" onclick="saveForm()">
        💾 Сохранить анкету
      </button>
    </div>
  </div>

  <script src="js/footer.js?v=202603031400"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const userId = tg.initDataUnsafe?.user?.id || 1907288209;
    const API_URL = 'https://felix2-0.vercel.app';

    let fields = [];

    const fieldTypes = {
      'text': 'Текст',
      'email': 'Email',
      'phone': 'Телефон',
      'select': 'Выбор из списка',
      'multiselect': 'Множественный выбор',
      'textarea': 'Многострочный текст'
    };

    // Load existing fields
    async function loadFields() {
      try {
        const res = await fetch(`${API_URL}/api/partner-referral-settings/form?partner_user_id=${userId}`);
        const data = await res.json();
        
        if (data.success && data.fields) {
          fields = data.fields;
          renderFields();
        }
      } catch (error) {
        console.error('Load error:', error);
      }
    }

    // Render fields
    function renderFields() {
      const container = document.getElementById('fieldsList');
      container.innerHTML = '';

      fields.forEach((field, index) => {
        const card = document.createElement('div');
        card.className = 'field-card';
        
        const showOptions = ['select', 'multiselect'].includes(field.field_type);
        
        card.innerHTML = `
          <div class="field-header">
            <div class="field-number">Поле ${index + 1}</div>
            <button class="btn-delete" onclick="deleteField(${index})">🗑️ Удалить</button>
          </div>

          <div class="form-group">
            <label>Название поля (field_name)</label>
            <input type="text" id="field_name_${index}" value="${field.field_name || ''}" placeholder="name, email, phone">
          </div>

          <div class="form-group">
            <label>Тип поля</label>
            <select id="field_type_${index}" onchange="updateFieldType(${index}, this.value)">
              ${Object.entries(fieldTypes).map(([value, label]) => `
                <option value="${value}" ${field.field_type === value ? 'selected' : ''}>${label}</option>
              `).join('')}
            </select>
          </div>

          <div class="form-group">
            <label>Текст вопроса</label>
            <input type="text" id="field_label_${index}" value="${field.field_label || ''}" placeholder="Как вас зовут?">
          </div>

          ${showOptions ? `
            <div class="form-group options-input">
              <label>Варианты (через запятую)</label>
              <input type="text" id="field_options_${index}" value="${field.field_options ? field.field_options.join(', ') : ''}" placeholder="Вариант 1, Вариант 2, Вариант 3">
            </div>
          ` : ''}

          <div class="form-group checkbox-group">
            <input type="checkbox" id="is_required_${index}" ${field.is_required ? 'checked' : ''}>
            <label for="is_required_${index}">Обязательное поле</label>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Add new field
    function addField() {
      fields.push({
        field_name: '',
        field_type: 'text',
        field_label: '',
        field_options: null,
        is_required: true,
        order_index: fields.length
      });
      renderFields();
    }

    // Delete field
    function deleteField(index) {
      if (confirm('Удалить это поле?')) {
        fields.splice(index, 1);
        renderFields();
      }
    }

    // Update field type
    function updateFieldType(index, type) {
      fields[index].field_type = type;
      renderFields();
    }

    // Save form
    async function saveForm() {
      try {
        // Collect data from inputs
        fields.forEach((field, index) => {
          field.field_name = document.getElementById(`field_name_${index}`).value;
          field.field_type = document.getElementById(`field_type_${index}`).value;
          field.field_label = document.getElementById(`field_label_${index}`).value;
          field.is_required = document.getElementById(`is_required_${index}`).checked;
          
          const optionsInput = document.getElementById(`field_options_${index}`);
          if (optionsInput) {
            const optionsText = optionsInput.value;
            field.field_options = optionsText ? optionsText.split(',').map(o => o.trim()) : null;
          }
        });

        // Validate
        for (let field of fields) {
          if (!field.field_name.trim()) {
            tg.showAlert('Заполните название поля (field_name)!');
            return;
          }
          if (!field.field_label.trim()) {
            tg.showAlert('Заполните текст вопроса!');
            return;
          }
          if (['select', 'multiselect'].includes(field.field_type) && (!field.field_options || field.field_options.length === 0)) {
            tg.showAlert('Укажите варианты для поля выбора!');
            return;
          }
        }

        // Delete all existing fields
        const existingRes = await fetch(`${API_URL}/api/partner-referral-settings/form?partner_user_id=${userId}`);
        const existingData = await existingRes.json();
        
        if (existingData.success && existingData.fields) {
          for (let f of existingData.fields) {
            await fetch(`${API_URL}/api/partner-referral-settings/form/${f.id}?partner_user_id=${userId}`, {
              method: 'DELETE'
            });
          }
        }

        // Save new fields
        for (let field of fields) {
          const res = await fetch(`${API_URL}/api/partner-referral-settings/form?partner_user_id=${userId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              field_name: field.field_name,
              field_type: field.field_type,
              field_label: field.field_label,
              field_options: field.field_options,
              is_required: field.is_required,
              order_index: field.order_index
            })
          });

          if (!res.ok) {
            throw new Error('Failed to save field');
          }
        }

        tg.showAlert('✅ Анкета сохранена!');
        setTimeout(() => window.history.back(), 1000);

      } catch (error) {
        console.error('Save error:', error);
        tg.showAlert('❌ Ошибка сохранения');
      }
    }

    // Load on start
    loadFields();
  </script>
</body>
</html>
