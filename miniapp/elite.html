<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Felix Elite - AI Assistant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Colors */
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f59e0b;
            --accent-dark: #d97706;
            --success: #10b981;
            --error: #ef4444;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            
            /* Light theme */
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--gradient-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        /* Header */
        .header {
            background: var(--surface);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* Navigation */
        .nav {
            background: var(--surface);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            min-width: min-content;
        }

        .nav-tab {
            padding: 10px 20px;
            border-radius: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-tab.active {
            background: var(--gradient-primary);
            color: white;
        }

        /* Container */
        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-gradient {
            background: var(--gradient-primary);
            color: white;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
        }

        .card-icon {
            font-size: 24px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Buttons */
        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Course Card */
        .course-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .course-card:active {
            transform: scale(0.98);
        }

        .course-image {
            width: 100%;
            height: 160px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .course-content {
            padding: 16px;
        }

        .course-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .course-meta {
            display: flex;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            transition: width 0.3s;
        }

        /* Achievement Badge */
        .achievement {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .achievement-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .achievement-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mb-16 {
            margin-bottom: 16px;
        }

        .mt-20 {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text">Felix Elite</div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">Felix Elite</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()">🌙</button>
                <button class="icon-btn" onclick="showSettings()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav">
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('home')">🏠 Главная</button>
            <button class="nav-tab" onclick="showTab('academy')">📚 Академия</button>
            <button class="nav-tab" onclick="showTab('profile')">👤 Профиль</button>
            <button class="nav-tab" onclick="showTab('ai')">🤖 AI</button>
        </div>
    </div>

    <!-- Content -->
    <div class="container">
        <!-- Home Tab -->
        <div id="homeTab" class="tab-content">
            <div class="card card-gradient fade-in">
                <div class="card-header">
                    <div>
                        <div class="card-title">Добро пожаловать!</div>
                        <div style="opacity: 0.9; margin-top: 4px;">Твой AI-ассистент готов к работе</div>
                    </div>
                    <div class="card-icon">👋</div>
                </div>
            </div>

            <div class="stats-grid fade-in">
                <div class="stat-card">
                    <div class="stat-value" id="statLevel">1</div>
                    <div class="stat-label">Уровень</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statXP">0</div>
                    <div class="stat-label">Опыт</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statCourses">0</div>
                    <div class="stat-label">Курсов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statAchievements">0</div>
                    <div class="stat-label">Достижений</div>
                </div>
            </div>

            <div class="card fade-in">
                <div class="card-title mb-16">🚀 Быстрые действия</div>
                <button class="btn btn-primary mb-16" onclick="showTab('ai')">
                    <span>🤖</span>
                    <span>Задать вопрос AI</span>
                </button>
                <button class="btn btn-secondary" onclick="showTab('academy')">
                    <span>📚</span>
                    <span>Начать обучение</span>
                </button>
            </div>
        </div>

        <!-- Academy Tab -->
        <div id="academyTab" class="tab-content hidden">
            <div class="card fade-in">
                <div class="card-title mb-16">📚 Мои курсы</div>
                <div id="myCoursesList"></div>
            </div>

            <div class="card fade-in">
                <div class="card-title mb-16">🔥 Популярные курсы</div>
                <div id="coursesList"></div>
            </div>
        </div>

        <!-- Profile Tab -->
        <div id="profileTab" class="tab-content hidden">
            <div class="card fade-in">
                <div class="card-title mb-16">👤 Профиль</div>
                <div id="profileInfo"></div>
            </div>

            <div class="card fade-in">
                <div class="card-title mb-16">🏆 Достижения</div>
                <div id="achievementsList"></div>
            </div>
        </div>

        <!-- AI Tab -->
        <div id="aiTab" class="tab-content hidden">
            <div class="card fade-in">
                <div class="card-title mb-16">🤖 AI Команды</div>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">
                    Выбери команду для работы с AI
                </p>
                <div id="aiCommandsList"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
