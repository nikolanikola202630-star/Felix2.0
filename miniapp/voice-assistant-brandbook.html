<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовой помощник — Felix Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/brandbook-variables.css">
    <link rel="stylesheet" href="css/brandbook-components.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="brandbook-body">
    <div class="container-brandbook">
        <!-- Шапка -->
        <header class="header-brandbook">
            <a href="main-brandbook.html" class="back-btn-brandbook">←</a>
            <h1 class="page-title-brandbook">Голосовой помощник</h1>
        </header>

        <!-- История диалогов -->
        <div class="chat-log-brandbook" id="chatLog">
            <!-- Примеры сообщений -->
            <div class="message-group-brandbook">
                <div class="message-time-brandbook">12:34</div>
                <div class="message-user-brandbook">
                    <div class="waveform-brandbook"></div>
                    <p>Какой курс лучше для старта?</p>
                </div>
            </div>

            <div class="message-group-brandbook">
                <div class="message-time-brandbook">12:35</div>
                <div class="message-assistant-brandbook">
                    <p>Рекомендую "Инвестиции 101".</p>
                    <div class="audio-player-brandbook">
                        <button class="play-btn-brandbook">▶</button>
                        <span class="audio-time-brandbook">0:42</span>
                    </div>
                </div>
            </div>

            <div class="message-group-brandbook">
                <div class="message-time-brandbook">12:36</div>
                <div class="message-user-brandbook">
                    <div class="waveform-brandbook"></div>
                    <p>А сколько стоит?</p>
                </div>
            </div>

            <div class="message-group-brandbook">
                <div class="message-time-brandbook">12:37</div>
                <div class="message-assistant-brandbook">
                    <p>2 990₽. Доступно по подписке.</p>
                    <div class="audio-player-brandbook">
                        <button class="play-btn-brandbook">▶</button>
                        <span class="audio-time-brandbook">0:15</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопка записи -->
        <div class="voice-input-container-brandbook">
            <button class="record-btn-brandbook" id="recordBtn">
                🎤
            </button>
            <p class="record-hint-brandbook">Держите для записи</p>
        </div>
    </div>

    <script src="js/voice-assistant-brandbook.js"></script>
</body>
</html>
