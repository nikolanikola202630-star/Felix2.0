<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/flagship-premium.css">
</head>
<body>
  <div class="container" style="text-align:center;padding:var(--space-16)">
    <div style="font-size:64px;margin-bottom:var(--space-4)">⚙️</div>
    <h1 style="margin-bottom:var(--space-2)">Настройки</h1>
    <p style="color:var(--text-secondary);margin-bottom:var(--space-8)">Функция в разработке</p>
    <button class="btn btn-primary" onclick="window.location.href='index.html'">← Назад на главную</button>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => window.location.href = 'index.html');
  </script>
</body>
</html>
