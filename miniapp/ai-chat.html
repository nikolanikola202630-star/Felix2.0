<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI-Ассистент - Felix Academy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .header-text p {
      font-size: 12px;
      opacity: 0.9;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      align-self: flex-end;
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border-bottom-right-radius: 4px;
    }

    .message-ai {
      align-self: flex-start;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000000);
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .typing {
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--tg-theme-hint-color, #999);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    .quick-replies {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .quick-replies::-webkit-scrollbar { display: none; }

    .quick-reply {
      padding: 8px 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 16px;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .quick-reply:active { transform: scale(0.95); }

    .input-container {
      padding: 12px 16px;
      background: var(--tg-theme-bg-color, #ffffff);
      border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-field {
      flex: 1;
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border: none;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }

    .send-button {
      width: 40px;
      height: 40px;
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .send-button:active { transform: scale(0.9); }
    .send-button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>AI-Ассистент</h1>
      <p>Groq Llama 3.3 70B</p>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="message message-ai">
      Привет! Я AI-ассистент Felix Academy. Могу помочь с выбором курса, ответить на вопросы по обучению или просто поболтать. Чем могу помочь? 😊
      <div class="message-time">Сейчас</div>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <div class="quick-reply" onclick="sendQuickReply('Какие курсы есть?')">Какие курсы есть?</div>
    <div class="quick-reply" onclick="sendQuickReply('Что такое трейдинг?')">Что такое трейдинг?</div>
    <div class="quick-reply" onclick="sendQuickReply('Как начать обучение?')">Как начать обучение?</div>
    <div class="quick-reply" onclick="sendQuickReply('Партнерская программа')">Партнерская программа</div>
  </div>

  <div class="input-container">
    <input type="text" id="messageInput" class="input-field" placeholder="Напишите сообщение..." 
           onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="send-button" id="sendButton" onclick="sendMessage()">➤</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => window.location.href = 'flagship.html');

    const GROQ_API_KEY = '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';
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    let conversationHistory = [];

    function addMessage(text, isUser = false) {
      const message = document.createElement('div');
      message.className = `message message-${isUser ? 'user' : 'ai'}`;
      
      const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      message.innerHTML = `${text}<div class="message-time">${time}</div>`;
      
      chatContainer.appendChild(message);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.innerHTML = '<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      chatContainer.appendChild(typing);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function getAIResponse(userMessage) {
      try {
        conversationHistory.push({
          role: 'user',
          content: userMessage
        });

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [
              {
                role: 'system',
                content: 'Ты AI-ассистент образовательной платформы Felix Academy. Помогаешь пользователям с выбором курсов, отвечаешь на вопросы по трейдингу, IT, психологии и саморазвитию. Отвечай кратко, дружелюбно на русском языке.'
              },
              ...conversationHistory
            ],
            temperature: 0.7,
            max_tokens: 500
          })
        });

        if (!response.ok) {
          throw new Error('API error');
        }

        const data = await response.json();
        const aiMessage = data.choices[0].message.content;

        conversationHistory.push({
          role: 'assistant',
          content: aiMessage
        });

        return aiMessage;
      } catch (error) {
        console.error('AI error:', error);
        return 'Извините, произошла ошибка. Попробуйте еще раз.';
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      // Добавить сообщение пользователя
      addMessage(text, true);
      messageInput.value = '';
      sendButton.disabled = true;

      // Показать typing
      showTyping();

      // Получить ответ AI
      const aiResponse = await getAIResponse(text);

      // Скрыть typing и показать ответ
      hideTyping();
      addMessage(aiResponse, false);
      sendButton.disabled = false;
      messageInput.focus();
    }

    function sendQuickReply(text) {
      messageInput.value = text;
      sendMessage();
    }

    // Фокус на input при загрузке
    messageInput.focus();
  </script>
  <script src="js/footer.js"></script>
</body>
</html>
