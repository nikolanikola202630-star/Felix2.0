<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Felix Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/brandbook-variables.css">
    <link rel="stylesheet" href="css/brandbook-components.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="brandbook-body">
    <div class="container-brandbook">
        <!-- Шапка -->
        <header class="header-brandbook">
            <a href="main-brandbook.html" class="back-btn-brandbook">←</a>
            <h1 class="page-title-brandbook">Профиль</h1>
        </header>

        <!-- Профиль пользователя -->
        <section class="profile-card-brandbook">
            <div class="profile-avatar-brandbook">🦁</div>
            <h2 class="profile-name-brandbook" id="profileName">Александр</h2>
            <p class="profile-since-brandbook">Участник с 2024</p>
        </section>

        <!-- Статистика -->
        <section class="profile-stats-section-brandbook">
            <h3 class="section-title-brandbook">Статистика</h3>
            <div class="info-card-brandbook">
                <div class="info-row-brandbook">
                    <span class="info-label-brandbook">Пройдено курсов:</span>
                    <span class="info-value-brandbook" id="completedCourses">7</span>
                </div>
                <div class="info-row-brandbook">
                    <span class="info-label-brandbook">Сертификатов:</span>
                    <span class="info-value-brandbook" id="certificates">3</span>
                </div>
                <div class="info-row-brandbook">
                    <span class="info-label-brandbook">В избранном:</span>
                    <span class="info-value-brandbook" id="favorites">5</span>
                </div>
            </div>
        </section>

        <!-- Настройки -->
        <section class="settings-section-brandbook">
            <h3 class="section-title-brandbook">Настройки</h3>
            <div class="info-card-brandbook">
                <div class="info-row-brandbook">
                    <span class="info-label-brandbook">Язык:</span>
                    <span class="info-value-brandbook">Русский</span>
                </div>
                <div class="info-row-brandbook">
                    <span class="info-label-brandbook">Уведомления:</span>
                    <span class="info-value-brandbook">Вкл</span>
                </div>
                <div class="info-row-brandbook">
                    <span class="info-label-brandbook">Тема:</span>
                    <span class="info-value-brandbook">Тёмная</span>
                </div>
            </div>
        </section>

        <!-- Действия -->
        <div class="profile-actions-brandbook">
            <button class="btn-brandbook-secondary" onclick="editProfile()">
                Редактировать
            </button>
            <button class="btn-brandbook-danger" onclick="logout()">
                Выйти
            </button>
        </div>
    </div>

    <script src="js/profile-brandbook.js"></script>
</body>
</html>
