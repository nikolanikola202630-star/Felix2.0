<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Академия - Главная</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding-bottom: 70px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    .welcome {
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      color: white;
      margin-bottom: 24px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      color: white;
    }

    .close-btn:active {
      background: rgba(255, 255, 255, 0.3);
    }

    .welcome h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .welcome p {
      opacity: 0.9;
      font-size: 14px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
    }

    .see-all {
      color: var(--tg-theme-link-color, #3390ec);
      font-size: 14px;
      text-decoration: none;
    }

    .carousel {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .carousel::-webkit-scrollbar {
      height: 4px;
    }

    .carousel::-webkit-scrollbar-thumb {
      background: var(--tg-theme-hint-color, #999);
      border-radius: 2px;
    }

    .card {
      flex: 0 0 280px;
      scroll-snap-align: start;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-content {
      padding: 12px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
    }

    .card-price {
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
    }

    .card-price.free {
      color: #10b981;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-theme-bg-color, #ffffff);
      border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--tg-theme-hint-color, #999);
      font-size: 12px;
      padding: 4px 12px;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--tg-theme-link-color, #3390ec);
    }

    .nav-icon {
      font-size: 24px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Приветствие -->
    <div class="welcome">
      <button class="close-btn" onclick="closeAcademy()">✕</button>
      <h1>Привет, <span id="userName">Пользователь</span>! 👋</h1>
      <p>Продолжай обучение или выбери новый курс</p>
    </div>

    <!-- Бесплатные материалы -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🎁 Бесплатные уроки</h2>
        <a href="catalog.html?filter=free" class="see-all">Все →</a>
      </div>
      <div id="freeLessons" class="carousel">
        <div class="loading">Загрузка...</div>
      </div>
    </section>

    <!-- Популярные курсы -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">🔥 Популярные курсы</h2>
        <a href="catalog.html" class="see-all">Все →</a>
      </div>
      <div id="popularCourses" class="carousel">
        <div class="loading">Загрузка...</div>
      </div>
    </section>

    <!-- Рекомендации партнера -->
    <section id="partnerSection" class="section" style="display:none">
      <div class="section-header">
        <h2 class="section-title">⭐ Рекомендовано партнером</h2>
      </div>
      <div id="partnerCourses" class="carousel">
        <div class="loading">Загрузка...</div>
      </div>
    </section>
  </div>

  <!-- Нижняя навигация -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div>Главная</div>
    </a>
    <a href="academy.html" class="nav-item active">
      <div class="nav-icon">🎓</div>
      <div>Академия</div>
    </a>
    <a href="catalog.html" class="nav-item">
      <div class="nav-icon">📚</div>
      <div>Каталог</div>
    </a>
    <a href="my-courses.html" class="nav-item">
      <div class="nav-icon">📖</div>
      <div>Мои курсы</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">👤</div>
      <div>Профиль</div>
    </a>
  </nav>

  <script src="js/performance.js?v=202603031400"></script>
  <script src="js/academy.js?v=202603031400"></script>
  <script src="js/footer.js?v=202603031400"></script>
</body>
</html>
