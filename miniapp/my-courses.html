<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои курсы - Академия</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding-bottom: 70px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--tg-theme-hint-color, #999);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
    }

    .tab {
      padding: 8px 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
    }

    .course-card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .course-card:active {
      transform: scale(0.98);
    }

    .course-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .course-content {
      padding: 16px;
    }

    .course-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .progress-container {
      margin: 12px 0;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
      margin-bottom: 4px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--tg-theme-link-color, #3390ec);
      transition: width 0.3s;
    }

    .progress-fill.completed {
      background: #10b981;
    }

    .course-meta {
      display: flex;
      gap: 16px;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
      margin-top: 8px;
    }

    .continue-button {
      width: 100%;
      padding: 12px;
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-text {
      color: var(--tg-theme-hint-color, #999);
      margin-bottom: 24px;
    }

    .btn-primary {
      padding: 14px 24px;
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-theme-bg-color, #ffffff);
      border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--tg-theme-hint-color, #999);
      font-size: 12px;
      padding: 4px 12px;
    }

    .nav-item.active {
      color: var(--tg-theme-link-color, #3390ec);
    }

    .nav-icon {
      font-size: 24px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Мои курсы</h1>
      <p id="coursesCount">0 курсов</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="filterCourses('all')">Все</div>
      <div class="tab" onclick="filterCourses('in-progress')">В процессе</div>
      <div class="tab" onclick="filterCourses('completed')">Завершенные</div>
    </div>

    <div id="coursesList">
      <div class="loading">Загрузка курсов...</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div>Главная</div>
    </a>
    <a href="catalog.html" class="nav-item">
      <div class="nav-icon">📚</div>
      <div>Каталог</div>
    </a>
    <a href="my-courses.html" class="nav-item active">
      <div class="nav-icon">📖</div>
      <div>Мои курсы</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">👤</div>
      <div>Профиль</div>
    </a>
  </nav>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => window.location.href = 'index.html');

    const user = tg.initDataUnsafe.user || { id: 0 };
    const API_URL = 'https://felix2-0.vercel.app/api';

    let allCourses = [];
    let currentFilter = 'all';

    async function loadCourses() {
      try {
        // TODO: Загрузить с API
        // const response = await fetch(`${API_URL}/user/courses?user_id=${user.id}`);
        // allCourses = await response.json();

        // Тестовые данные
        allCourses = [
          {
            id: 1,
            title: 'Основы трейдинга',
            image: 'https://via.placeholder.com/600x180?text=Trading',
            progress: 45,
            lessons_completed: 2,
            total_lessons: 4,
            last_lesson_id: 2,
            purchased_at: '2026-03-01'
          },
          {
            id: 2,
            title: 'Python для начинающих',
            image: 'https://via.placeholder.com/600x180?text=Python',
            progress: 100,
            lessons_completed: 10,
            total_lessons: 10,
            last_lesson_id: 10,
            purchased_at: '2026-02-15'
          }
        ];

        renderCourses();
      } catch (error) {
        console.error('Error loading courses:', error);
        tg.showAlert('Ошибка загрузки курсов');
      }
    }

    function renderCourses() {
      const container = document.getElementById('coursesList');
      
      let filteredCourses = allCourses;
      
      if (currentFilter === 'in-progress') {
        filteredCourses = allCourses.filter(c => c.progress > 0 && c.progress < 100);
      } else if (currentFilter === 'completed') {
        filteredCourses = allCourses.filter(c => c.progress === 100);
      }

      document.getElementById('coursesCount').textContent = 
        `${filteredCourses.length} ${filteredCourses.length === 1 ? 'курс' : 'курсов'}`;

      if (filteredCourses.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">Нет курсов</div>
            <div class="empty-text">
              ${currentFilter === 'all' ? 'Вы еще не приобрели ни одного курса' : 
                currentFilter === 'in-progress' ? 'Нет курсов в процессе изучения' :
                'Нет завершенных курсов'}
            </div>
            <button class="btn-primary" onclick="window.location.href='catalog.html'">
              Перейти в каталог
            </button>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredCourses.map(course => `
        <div class="course-card" onclick="openCourse(${course.id})">
          <img src="${course.image}" alt="${course.title}" class="course-image">
          <div class="course-content">
            <div class="course-title">${course.title}</div>
            
            <div class="progress-container">
              <div class="progress-label">
                <span>Прогресс</span>
                <span>${course.progress}%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill ${course.progress === 100 ? 'completed' : ''}" 
                     style="width: ${course.progress}%"></div>
              </div>
            </div>

            <div class="course-meta">
              <span>📖 ${course.lessons_completed}/${course.total_lessons} уроков</span>
            </div>

            ${course.progress < 100 ? `
              <button class="continue-button" onclick="continueLesson(${course.last_lesson_id}); event.stopPropagation();">
                Продолжить обучение →
              </button>
            ` : `
              <button class="continue-button" style="background: #10b981;">
                ✓ Курс завершен
              </button>
            `}
          </div>
        </div>
      `).join('');
    }

    function filterCourses(filter) {
      currentFilter = filter;
      
      // Update tabs
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      
      renderCourses();
    }

    function openCourse(courseId) {
      window.location.href = `course.html?id=${courseId}`;
    }

    function continueLesson(lessonId) {
      window.location.href = `lesson.html?id=${lessonId}`;
    }

    loadCourses();
  </script>
  <script src="js/footer.js"></script>
</body>
</html>
