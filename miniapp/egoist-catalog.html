<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGOIST ACADEMY - Каталог</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/egoist-theme.css">
  <style>
    body {
      padding: var(--space-4);
      padding-bottom: 100px;
    }

    .header {
      margin-bottom: var(--space-8);
    }

    .header h1 {
      margin-bottom: var(--space-2);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }

    .category-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .category-card:hover {
      border-color: var(--text-primary);
      transform: translateY(-4px);
    }

    .category-icon {
      font-size: 48px;
      margin-bottom: var(--space-4);
    }

    .category-title {
      font-size: var(--text-h3);
      font-weight: var(--font-bold);
      margin-bottom: var(--space-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .category-desc {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
    }

    .category-meta {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-4);
      padding-top: var(--space-4);
      border-top: 1px solid var(--border-light);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>EGOIST ACADEMY</h1>
      <p class="text-secondary">Выберите направление обучения</p>
    </div>

    <div class="categories-grid" id="categoriesGrid"></div>
  </div>

  <script src="core/state.js"></script>
  <script src="core/utils.js"></script>
  <script>
    const categories = [
      {
        id: 'academy-kings',
        title: 'ACADEMY KINGS',
        icon: '👑',
        description: 'Элитное обучение для избранных. Эксклюзивные материалы и менторство.',
        lessons: 12,
        duration: '8 часов'
      },
      {
        id: 'brain',
        title: 'BRAIN',
        icon: '🧠',
        description: 'Развитие мышления, памяти и когнитивных способностей.',
        lessons: 15,
        duration: '10 часов'
      },
      {
        id: 'it',
        title: 'IT',
        icon: '💻',
        description: 'Программирование, технологии и цифровые навыки будущего.',
        lessons: 20,
        duration: '15 часов'
      },
      {
        id: 'trading',
        title: 'TRADING',
        icon: '📈',
        description: 'Трейдинг, инвестиции и финансовые рынки.',
        lessons: 18,
        duration: '12 часов'
      },
      {
        id: 'success',
        title: 'SUCCESS',
        icon: '🎯',
        description: 'Путь к успеху: цели, мотивация, достижения.',
        lessons: 10,
        duration: '6 часов'
      }
    ];

    function renderCategories() {
      const grid = document.getElementById('categoriesGrid');
      grid.innerHTML = categories.map(cat => `
        <div class="category-card" onclick="openCategory('${cat.id}')">
          <div class="category-icon">${cat.icon}</div>
          <h3 class="category-title">${cat.title}</h3>
          <p class="category-desc">${cat.description}</p>
          <div class="category-meta">
            <div class="meta-item">
              <span>📚</span>
              <span>${cat.lessons} уроков</span>
            </div>
            <div class="meta-item">
              <span>⏱</span>
              <span>${cat.duration}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openCategory(id) {
      if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
      }
      window.location.href = `egoist-course.html?id=${id}`;
    }

    // Инициализация
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    renderCategories();
  </script>
</body>
</html>
