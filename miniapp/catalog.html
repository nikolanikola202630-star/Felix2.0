<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Академия - Каталог</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding-bottom: 70px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      position: sticky;
      top: 0;
      background: var(--tg-theme-bg-color, #ffffff);
      padding: 16px 0;
      z-index: 100;
      border-bottom: 1px solid var(--tg-theme-hint-color, #e0e0e0);
    }

    .search-box {
      position: relative;
      margin-bottom: 16px;
    }

    .search-input {
      width: 100%;
      padding: 12px 40px 12px 16px;
      border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      border-radius: 12px;
      font-size: 16px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
    }

    .search-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--tg-theme-hint-color, #999);
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      border-radius: 20px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
      border-color: var(--tg-theme-button-color, #3390ec);
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .course-card {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .course-card:active {
      transform: scale(0.98);
    }

    .course-image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .course-content {
      padding: 12px;
    }

    .course-category {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 8px;
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
    }

    .course-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .course-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .course-price {
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
    }

    .course-price.free {
      color: #10b981;
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--tg-theme-hint-color, #999);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-theme-bg-color, #ffffff);
      border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: var(--tg-theme-hint-color, #999);
      font-size: 12px;
      padding: 4px 12px;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--tg-theme-link-color, #3390ec);
    }

    .nav-icon {
      font-size: 24px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--tg-theme-hint-color, #999);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Шапка с поиском и фильтрами -->
    <div class="header">
      <div class="search-box">
        <input 
          type="text" 
          class="search-input" 
          placeholder="Поиск курсов..."
          id="searchInput"
        >
        <span class="search-icon">🔍</span>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-category="all">Все</button>
        <button class="filter-btn" data-category="trading">📈 Трейдинг</button>
        <button class="filter-btn" data-category="it">💻 IT</button>
        <button class="filter-btn" data-category="psychology">🧠 Психология</button>
        <button class="filter-btn" data-category="self-development">🚀 Саморазвитие</button>
        <button class="filter-btn" data-category="free">🎁 Бесплатные</button>
      </div>
    </div>

    <!-- Сетка курсов -->
    <div id="coursesGrid" class="courses-grid">
      <div class="loading">Загрузка курсов...</div>
    </div>
  </div>

  <!-- Нижняя навигация -->
  <nav class="bottom-nav">
    <a href="academy.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div>Главная</div>
    </a>
    <a href="catalog.html" class="nav-item active">
      <div class="nav-icon">📚</div>
      <div>Каталог</div>
    </a>
    <a href="my-courses.html" class="nav-item">
      <div class="nav-icon">📖</div>
      <div>Мои курсы</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">👤</div>
      <div>Профиль</div>
    </a>
  </nav>

  <script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => window.location.href = 'academy.html');

    const API_URL = 'https://felix2-0.vercel.app/api';

    // Тестовые данные
    const allCourses = [
      {
        id: 1,
        title: 'Основы трейдинга',
        category: 'trading',
        price: 2990,
        rating: 4.8,
        image: 'https://via.placeholder.com/280x160?text=Trading',
        students: 1250
      },
      {
        id: 2,
        title: 'Python для начинающих',
        category: 'it',
        price: 0,
        rating: 4.9,
        image: 'https://via.placeholder.com/280x160?text=Python',
        students: 3400
      },
      {
        id: 3,
        title: 'Психология успеха',
        category: 'psychology',
        price: 1990,
        rating: 4.7,
        image: 'https://via.placeholder.com/280x160?text=Psychology',
        students: 890
      },
      {
        id: 4,
        title: 'JavaScript с нуля',
        category: 'it',
        price: 3490,
        rating: 4.9,
        image: 'https://via.placeholder.com/280x160?text=JavaScript',
        students: 2100
      },
      {
        id: 5,
        title: 'Криптовалюты и блокчейн',
        category: 'trading',
        price: 4990,
        rating: 4.6,
        image: 'https://via.placeholder.com/280x160?text=Crypto',
        students: 1560
      },
      {
        id: 6,
        title: 'Тайм-менеджмент',
        category: 'self-development',
        price: 0,
        rating: 4.8,
        image: 'https://via.placeholder.com/280x160?text=Time',
        students: 2890
      }
    ];

    let currentCategory = 'all';
    let searchQuery = '';

    // Категории на русском
    const categoryNames = {
      trading: 'Трейдинг',
      it: 'IT',
      psychology: 'Психология',
      'self-development': 'Саморазвитие'
    };

    // Рендер курсов
    function renderCourses(courses) {
      const grid = document.getElementById('coursesGrid');

      if (courses.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📚</div>
            <div>Курсы не найдены</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = courses.map(course => `
        <div class="course-card" onclick="openCourse(${course.id})">
          <img src="${course.image}" alt="${course.title}" class="course-image">
          <div class="course-content">
            <span class="course-category">${categoryNames[course.category] || course.category}</span>
            <div class="course-title">${course.title}</div>
            <div class="course-meta">
              <span class="course-price ${course.price === 0 ? 'free' : ''}">
                ${course.price > 0 ? course.price + ' ₽' : 'Бесплатно'}
              </span>
              <span class="rating">⭐ ${course.rating}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Фильтрация курсов
    function filterCourses() {
      let filtered = allCourses;

      // Фильтр по категории
      if (currentCategory !== 'all') {
        if (currentCategory === 'free') {
          filtered = filtered.filter(c => c.price === 0);
        } else {
          filtered = filtered.filter(c => c.category === currentCategory);
        }
      }

      // Поиск
      if (searchQuery) {
        filtered = filtered.filter(c => 
          c.title.toLowerCase().includes(searchQuery.toLowerCase())
        );
      }

      renderCourses(filtered);
    }

    // Открыть курс
    function openCourse(courseId) {
      window.location.href = `course.html?id=${courseId}`;
    }

    // Обработчики фильтров
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        filterCourses();
      });
    });

    // Обработчик поиска
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      filterCourses();
    });

    // Загрузка данных
    async function loadCourses() {
      try {
        // TODO: Загрузить с API
        // const courses = await fetch(`${API_URL}/courses`).then(r => r.json());
        
        // Пока используем тестовые данные
        renderCourses(allCourses);
      } catch (error) {
        console.error('Error loading courses:', error);
        tg.showAlert('Ошибка загрузки курсов');
      }
    }

    // Запуск
    loadCourses();
  </script>
</body>
</html>
