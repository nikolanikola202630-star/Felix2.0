<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - Felix Academy V12</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Preconnect для шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Шрифты брендбука -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Стили брендбука -->
    <link rel="stylesheet" href="styles/brandbook-variables.css">
    <link rel="stylesheet" href="css/brandbook-components.css">
    
    <style>
        .search-container {
            margin-bottom: var(--space-6);
        }

        .search-input {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            border: var(--line-thin) solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: var(--text-base);
            transition: var(--transition-all);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--border-gold);
            box-shadow: var(--shadow-gold);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .filters-container {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-6);
            overflow-x: auto;
            padding-bottom: var(--space-2);
            scrollbar-width: none;
        }

        .filters-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            border: var(--line-thin) solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            text-transform: uppercase;
            letter-spacing: var(--tracking-wide);
            cursor: pointer;
            transition: var(--transition-all);
            white-space: nowrap;
            user-select: none;
        }

        .filter-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--old-gold-alpha-10);
            border-color: var(--border-gold);
            color: var(--old-gold);
        }

        .course-price {
            font-family: var(--font-accent);
            font-size: var(--text-lg);
            font-weight: var(--font-extrabold);
            color: var(--deep-emerald);
        }

        .course-rating {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            color: var(--old-gold);
            font-size: var(--text-sm);
            font-weight: var(--font-semibold);
        }
    </style>
</head>
<body>
    <div class="app-container-brandbook">
        <!-- Header -->
        <header class="header-brandbook">
            <div class="logo-brandbook">
                <div class="logo-icon">🦁</div>
                <div>
                    <div class="logo-text">Felix Academy</div>
                    <div class="logo-subtitle">Каталог курсов</div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-brandbook">
            <!-- Search -->
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="🔍 Поиск курсов..."
                    oninput="filterCourses()"
                >
            </div>

            <!-- Filters -->
            <div class="filters-container">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все</button>
                <button class="filter-btn" data-filter="popular" onclick="setFilter('popular')">Популярные</button>
                <button class="filter-btn" data-filter="new" onclick="setFilter('new')">Новые</button>
                <button class="filter-btn" data-filter="free" onclick="setFilter('free')">Бесплатные</button>
                <button class="filter-btn" data-filter="premium" onclick="setFilter('premium')">Премиум</button>
            </div>

            <!-- Courses Section -->
            <section class="section-brandbook">
                <div class="section-header-brandbook">
                    <h3 class="section-title-brandbook">Доступные курсы</h3>
                    <span class="view-all-brandbook" id="coursesCount">0 курсов</span>
                </div>

                <div id="coursesContainer"></div>
            </section>
        </main>
    </div>

    <script src="js/ui-interactions.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        tg?.ready();
        tg?.expand();
        tg?.BackButton.show();
        tg?.BackButton.onClick(() => window.location.href = 'elite-brandbook.html');

        let allCourses = [];
        let currentFilter = 'all';

        // Данные курсов
        const coursesData = [
            {
                id: 1,
                title: 'Детективная лаборатория сознания',
                description: 'Исследование механизмов мышления и принятия решений',
                price: 2990,
                rating: 4.9,
                lessons: 12,
                hours: 8,
                category: 'popular',
                icon: '🧠'
            },
            {
                id: 2,
                title: 'Эмоциональный интеллект',
                description: 'Развитие навыков управления эмоциями',
                price: 3490,
                rating: 4.8,
                lessons: 10,
                hours: 6,
                category: 'popular',
                icon: '💎'
            },
            {
                id: 3,
                title: 'Финансовая грамотность',
                description: 'Основы управления личными финансами',
                price: 1990,
                rating: 4.7,
                lessons: 8,
                hours: 4,
                category: 'new',
                icon: '💰'
            },
            {
                id: 4,
                title: 'Стратегии успеха',
                description: 'Методы достижения целей и планирования',
                price: 2490,
                rating: 4.9,
                lessons: 15,
                hours: 10,
                category: 'premium',
                icon: '🎯'
            },
            {
                id: 5,
                title: 'Основы инвестирования',
                description: 'Введение в мир инвестиций и капитала',
                price: 0,
                rating: 4.6,
                lessons: 6,
                hours: 3,
                category: 'free',
                icon: '📈'
            },
            {
                id: 6,
                title: 'Искусство переговоров',
                description: 'Техники эффективной коммуникации',
                price: 2790,
                rating: 4.8,
                lessons: 9,
                hours: 5,
                category: 'new',
                icon: '🤝'
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            allCourses = coursesData;
            renderCourses(allCourses);
        });

        function renderCourses(courses) {
            const container = document.getElementById('coursesContainer');
            const count = document.getElementById('coursesCount');

            count.textContent = `${courses.length} ${getCourseWord(courses.length)}`;

            if (courses.length === 0) {
                container.innerHTML = `
                    <div class="card-brandbook" style="text-align: center; padding: var(--space-8);">
                        <div style="font-size: 64px; margin-bottom: var(--space-4); opacity: 0.5;">🔍</div>
                        <p style="color: var(--text-secondary);">Курсы не найдены</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = courses.map(course => `
                <div class="card-brandbook" onclick="openCourse(${course.id})">
                    <div class="card-header-brandbook">
                        <div class="card-icon-brandbook">${course.icon}</div>
                        <div class="card-info-brandbook">
                            <div class="card-title-brandbook">${course.title}</div>
                            <div class="card-meta-brandbook">
                                <span class="course-rating">⭐ ${course.rating}</span>
                                <span>•</span>
                                <span>${course.lessons} уроков</span>
                                <span>•</span>
                                <span>${course.hours} ч</span>
                            </div>
                        </div>
                    </div>

                    <p style="color: var(--text-secondary); font-size: var(--text-sm); margin: var(--space-3) 0;">
                        ${course.description}
                    </p>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-4);">
                        <div class="course-price">
                            ${course.price === 0 ? 'Бесплатно' : `${course.price} ₽`}
                        </div>
                        <button class="btn-brandbook btn-brandbook-sm" onclick="event.stopPropagation(); openCourse(${course.id})">
                            Подробнее
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;

            // Обновить активный фильтр
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

            // Фильтровать курсы
            filterCourses();
        }

        function filterCourses() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allCourses;

            // Фильтр по категории
            if (currentFilter !== 'all') {
                filtered = filtered.filter(course => course.category === currentFilter);
            }

            // Фильтр по поиску
            if (searchTerm) {
                filtered = filtered.filter(course => 
                    course.title.toLowerCase().includes(searchTerm) ||
                    course.description.toLowerCase().includes(searchTerm)
                );
            }

            renderCourses(filtered);
        }

        function openCourse(courseId) {
            window.location.href = `course.html?id=${courseId}`;
        }

        function getCourseWord(count) {
            const lastDigit = count % 10;
            const lastTwoDigits = count % 100;

            if (lastTwoDigits >= 11 && lastTwoDigits <= 19) {
                return 'курсов';
            }

            if (lastDigit === 1) {
                return 'курс';
            }

            if (lastDigit >= 2 && lastDigit <= 4) {
                return 'курса';
            }

            return 'курсов';
        }
    </script>
</body>
</html>
