<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Партнёрская панель — Felix Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/brandbook-variables.css">
    <link rel="stylesheet" href="css/brandbook-components.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="brandbook-body">
    <div class="container-brandbook">
        <!-- Шапка -->
        <header class="header-brandbook">
            <a href="main-brandbook.html" class="back-btn-brandbook">←</a>
            <h1 class="page-title-brandbook">Партнёрская панель</h1>
        </header>

        <!-- Статус -->
        <section class="status-section-brandbook">
            <p class="status-text-brandbook">
                <span id="partnerName">Александр</span>, ваш статус: 
                <span class="status-badge-brandbook">Platinum</span>
            </p>
        </section>

        <!-- Статистика -->
        <section class="stats-grid-brandbook">
            <div class="stat-card-brandbook">
                <div class="stat-icon-brandbook">🦁</div>
                <div class="stat-value-brandbook" id="referralsCount">24</div>
                <div class="stat-label-brandbook">Рефералы</div>
            </div>

            <div class="stat-card-brandbook stat-card-success-brandbook">
                <div class="stat-icon-brandbook">⚜️</div>
                <div class="stat-value-brandbook" id="totalEarned">12 450₽</div>
                <div class="stat-label-brandbook">Заработано</div>
            </div>

            <div class="stat-card-brandbook">
                <div class="stat-icon-brandbook">📊</div>
                <div class="stat-value-brandbook" id="conversion">68%</div>
                <div class="stat-label-brandbook">Конверсия</div>
            </div>

            <div class="stat-card-brandbook stat-card-success-brandbook">
                <div class="stat-icon-brandbook">💰</div>
                <div class="stat-value-brandbook" id="withdrawn">8 200₽</div>
                <div class="stat-label-brandbook">Выплачено</div>
            </div>
        </section>

        <!-- График -->
        <section class="chart-section-brandbook">
            <h3 class="section-title-brandbook">Динамика рефералов</h3>
            <div class="graph-placeholder-brandbook">
                <svg viewBox="0 0 300 150" class="chart-svg-brandbook">
                    <polyline points="0,120 50,100 100,80 150,60 200,50 250,40 300,30" 
                              fill="none" stroke="var(--gold)" stroke-width="2"/>
                    <circle cx="300" cy="30" r="4" fill="var(--gold)"/>
                </svg>
            </div>
        </section>

        <!-- Реферальные ссылки -->
        <section class="links-section-brandbook">
            <h3 class="section-title-brandbook">Мои ссылки</h3>
            <div class="link-card-brandbook">
                <input type="text" 
                       class="link-input-brandbook" 
                       value="felix.academy/ref/abc123" 
                       readonly 
                       id="refLink">
                <button class="btn-brandbook-secondary" onclick="copyLink()">
                    Скопировать
                </button>
            </div>
        </section>

        <!-- Кнопка выплаты -->
        <div class="action-section-brandbook">
            <button class="btn-brandbook" onclick="requestPayout()">
                Запросить выплату
            </button>
        </div>
    </div>

    <script src="js/partner-dashboard-brandbook.js"></script>
</body>
</html>
