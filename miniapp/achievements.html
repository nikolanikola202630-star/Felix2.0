<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Достижения - Felix Academy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/flagship-premium.css">
  <link rel="stylesheet" href="css/micro-animations.css">
  <style>
    .achievement-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-4);
      position: relative;
      overflow: hidden;
    }

    .achievement-card.unlocked {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border: 2px solid var(--primary);
    }

    .achievement-card.locked {
      opacity: 0.6;
    }

    .achievement-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }

    .achievement-card.locked .achievement-icon {
      background: var(--bg-tertiary);
      filter: grayscale(100%);
    }

    .achievement-info {
      flex: 1;
    }

    .achievement-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: var(--space-1);
    }

    .achievement-description {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .achievement-progress {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .progress-bar-container {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-top: var(--space-2);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      border-radius: var(--radius-full);
      transition: width 0.5s ease;
    }

    .achievement-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #10b981;
      color: white;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
    }

    .stats-summary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
      text-align: center;
    }

    .stats-summary h2 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: var(--space-2);
    }

    .stats-summary p {
      opacity: 0.9;
    }

    .category-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
      overflow-x: auto;
    }

    .category-tab {
      padding: var(--space-2) var(--space-4);
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .category-tab.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="stats-summary stagger-item">
      <h2 id="unlockedCount">0</h2>
      <p>Достижений разблокировано</p>
    </div>

    <div class="category-tabs">
      <div class="category-tab active" onclick="filterCategory('all')">Все</div>
      <div class="category-tab" onclick="filterCategory('learning')">📚 Обучение</div>
      <div class="category-tab" onclick="filterCategory('streak')">🔥 Активность</div>
      <div class="category-tab" onclick="filterCategory('social')">👥 Социальные</div>
      <div class="category-tab" onclick="filterCategory('special')">⭐ Особые</div>
    </div>

    <div id="achievementsList"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.BackButton.show();
    tg.BackButton.onClick(() => window.location.href = 'index.html');

    const user = tg.initDataUnsafe.user || { id: 0 };
    let currentCategory = 'all';

    const achievements = [
      {
        id: 1,
        icon: '🎯',
        name: 'Первый шаг',
        description: 'Завершите первый урок',
        category: 'learning',
        unlocked: true,
        progress: 100,
        maxProgress: 1
      },
      {
        id: 2,
        icon: '📚',
        name: 'Книголюб',
        description: 'Завершите 10 уроков',
        category: 'learning',
        unlocked: true,
        progress: 15,
        maxProgress: 10
      },
      {
        id: 3,
        icon: '🎓',
        name: 'Выпускник',
        description: 'Завершите первый курс',
        category: 'learning',
        unlocked: false,
        progress: 0,
        maxProgress: 1
      },
      {
        id: 4,
        icon: '🔥',
        name: 'Неделя подряд',
        description: 'Учитесь 7 дней подряд',
        category: 'streak',
        unlocked: true,
        progress: 7,
        maxProgress: 7
      },
      {
        id: 5,
        icon: '⚡',
        name: 'Месяц подряд',
        description: 'Учитесь 30 дней подряд',
        category: 'streak',
        unlocked: false,
        progress: 7,
        maxProgress: 30
      },
      {
        id: 6,
        icon: '👥',
        name: 'Амбассадор',
        description: 'Пригласите 5 друзей',
        category: 'social',
        unlocked: false,
        progress: 2,
        maxProgress: 5
      },
      {
        id: 7,
        icon: '💬',
        name: 'Активный участник',
        description: 'Оставьте 10 комментариев',
        category: 'social',
        unlocked: false,
        progress: 3,
        maxProgress: 10
      },
      {
        id: 8,
        icon: '⭐',
        name: 'Отличник',
        description: 'Получите 90%+ на 5 тестах',
        category: 'special',
        unlocked: true,
        progress: 5,
        maxProgress: 5
      },
      {
        id: 9,
        icon: '🏆',
        name: 'Чемпион',
        description: 'Завершите 5 курсов',
        category: 'special',
        unlocked: false,
        progress: 1,
        maxProgress: 5
      },
      {
        id: 10,
        icon: '💎',
        name: 'Легенда',
        description: 'Разблокируйте все достижения',
        category: 'special',
        unlocked: false,
        progress: 5,
        maxProgress: 10
      }
    ];

    function filterCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      
      tg.HapticFeedback?.selectionChanged();
      
      renderAchievements();
    }

    function renderAchievements() {
      const container = document.getElementById('achievementsList');
      
      let filtered = achievements;
      if (currentCategory !== 'all') {
        filtered = achievements.filter(a => a.category === currentCategory);
      }

      const unlockedCount = achievements.filter(a => a.unlocked).length;
      document.getElementById('unlockedCount').textContent = `${unlockedCount}/${achievements.length}`;

      container.innerHTML = filtered.map((achievement, index) => {
        const progressPercent = (achievement.progress / achievement.maxProgress) * 100;
        
        return `
          <div class="achievement-card ${achievement.unlocked ? 'unlocked' : 'locked'} stagger-item" 
               style="animation-delay: ${index * 50}ms"
               onclick="showAchievementDetails(${achievement.id})">
            ${achievement.unlocked ? '<div class="achievement-badge">✓ Получено</div>' : ''}
            <div class="achievement-icon">${achievement.icon}</div>
            <div class="achievement-info">
              <div class="achievement-name">${achievement.name}</div>
              <div class="achievement-description">${achievement.description}</div>
              ${!achievement.unlocked ? `
                <div class="achievement-progress">
                  Прогресс: ${achievement.progress}/${achievement.maxProgress}
                </div>
                <div class="progress-bar-container">
                  <div class="progress-bar-fill" style="width: ${progressPercent}%"></div>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function showAchievementDetails(achievementId) {
      const achievement = achievements.find(a => a.id === achievementId);
      if (!achievement) return;

      tg.HapticFeedback?.impactOccurred('medium');
      
      const status = achievement.unlocked ? 
        `✅ Получено!\n\nПрогресс: ${achievement.progress}/${achievement.maxProgress}` :
        `🔒 Заблокировано\n\nПрогресс: ${achievement.progress}/${achievement.maxProgress}`;
      
      tg.showAlert(`${achievement.icon} ${achievement.name}\n\n${achievement.description}\n\n${status}`);
    }

    // Initialize
    renderAchievements();

    console.log('🎯 Achievements page loaded');
  </script>
  <script src="js/footer.js?v=202603031400"></script>
</body>
</html>
