<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ассистент - Felix Academy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/flagship-premium.css?v=10.1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Боковая панель с папками */
    .sidebar {
      width: 280px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .btn-new-chat {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #667eea;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-new-chat:active {
      transform: scale(0.95);
    }

    .folders-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .folder-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s;
    }

    .folder-item:hover {
      background: #2a2a2a;
    }

    .folder-item.active {
      background: #667eea;
    }

    .folder-icon {
      font-size: 20px;
    }

    .folder-info {
      flex: 1;
    }

    .folder-name {
      font-size: 14px;
      font-weight: 500;
    }

    .folder-count {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .chats-list {
      padding: 8px;
      border-top: 1px solid #2a2a2a;
      max-height: 300px;
      overflow-y: auto;
    }

    .chat-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .chat-item:hover {
      background: #2a2a2a;
    }

    .chat-item.active {
      background: #2a2a2a;
      border-left: 3px solid #667eea;
    }

    .chat-item.pinned::before {
      content: '📌';
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 12px;
    }

    .chat-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-preview {
      font-size: 12px;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-time {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 4px;
    }

    /* Основная область чата */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f0f0f;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-toggle-sidebar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-title {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-model {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .btn-chat-menu {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    /* Область сообщений */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      align-self: flex-end;
      background: #667eea;
      border-bottom-right-radius: 4px;
    }

    .message-ai {
      align-self: flex-start;
      background: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 16px;
      background: #1a1a1a;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #667eea;
      animation: typing 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* Область ввода */
    .input-area {
      padding: 16px;
      border-top: 1px solid #2a2a2a;
      background: #1a1a1a;
    }

    .input-container {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      background: #0f0f0f;
      color: white;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 44px;
    }

    .input-field:focus {
      border-color: #667eea;
    }

    .btn-voice {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-voice:active {
      transform: scale(0.95);
    }

    .btn-voice.recording {
      background: #ef4444;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #667eea;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-send:active {
      transform: scale(0.95);
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Пустое состояние */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state p {
      opacity: 0.6;
      font-size: 14px;
    }

    /* Адаптив */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }
    }
  </style>
</head>
<body>
  <!-- Боковая панель -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>AI Чаты</h2>
      <button class="btn-new-chat" onclick="createNewChat()">+</button>
    </div>

    <div class="folders-list" id="foldersList">
      <!-- Папки загружаются динамически -->
    </div>

    <div class="chats-list" id="chatsList">
      <!-- Чаты загружаются динамически -->
    </div>
  </div>

  <!-- Основная область -->
  <div class="main-area">
    <div class="chat-header">
      <button class="btn-toggle-sidebar" onclick="toggleSidebar()">☰</button>
      <div class="chat-header-info">
        <div class="chat-header-title" id="chatTitle">Новый чат</div>
        <div class="chat-header-model" id="chatModel">Llama 3.3 70B</div>
      </div>
      <button class="btn-chat-menu" onclick="showChatMenu()">⋮</button>
    </div>

    <div class="messages-area" id="messagesArea">
      <div class="empty-state">
        <div class="empty-state-icon">🤖</div>
        <h3>Начните новый диалог</h3>
        <p>Задайте вопрос или выберите шаблон</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <textarea 
          class="input-field" 
          id="messageInput" 
          placeholder="Напишите сообщение..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="btn-voice" id="voiceBtn" onclick="toggleVoiceRecording()">🎤</button>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script src="js/footer.js?v=10.1"></script>
  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const API_URL = 'https://felix2-0.vercel.app';
    const userId = tg?.initDataUnsafe?.user?.id || 1907288209;

    let currentFolderId = null;
    let currentChatId = null;
    let folders = [];
    let chats = [];
    let messages = [];
    let isRecording = false;
    let mediaRecorder = null;

    // Загрузка данных при старте
    async function init() {
      await loadFolders();
      await loadChats();
    }

    // Загрузить папки
    async function loadFolders() {
      try {
        const res = await fetch(`${API_URL}/api/ai-chat-folders?userId=${userId}`);
        const data = await res.json();
        
        if (data.success) {
          folders = data.folders;
          renderFolders();
          
          // Выбрать первую папку
          if (folders.length > 0) {
            selectFolder(folders[0].id);
          }
        }
      } catch (error) {
        console.error('Load folders error:', error);
      }
    }

    // Отрисовать папки
    function renderFolders() {
      const container = document.getElementById('foldersList');
      container.innerHTML = folders.map(folder => `
        <div class="folder-item ${currentFolderId === folder.id ? 'active' : ''}" 
             onclick="selectFolder(${folder.id})">
          <div class="folder-icon">${folder.icon}</div>
          <div class="folder-info">
            <div class="folder-name">${folder.name}</div>
            <div class="folder-count">${folder.chat_count || 0} чатов</div>
          </div>
        </div>
      `).join('');
    }

    // Выбрать папку
    async function selectFolder(folderId) {
      currentFolderId = folderId;
      renderFolders();
      await loadChats(folderId);
    }

    // Загрузить чаты
    async function loadChats(folderId = currentFolderId) {
      try {
        const url = folderId 
          ? `${API_URL}/api/ai-chat-folders/chats?userId=${userId}&folderId=${folderId}`
          : `${API_URL}/api/ai-chat-folders/chats?userId=${userId}`;
        
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.success) {
          chats = data.chats;
          renderChats();
        }
      } catch (error) {
        console.error('Load chats error:', error);
      }
    }

    // Отрисовать чаты
    function renderChats() {
      const container = document.getElementById('chatsList');
      
      if (chats.length === 0) {
        container.innerHTML = '<div style="padding: 20px; text-align: center; opacity: 0.5;">Нет чатов</div>';
        return;
      }

      container.innerHTML = chats.map(chat => `
        <div class="chat-item ${currentChatId === chat.id ? 'active' : ''} ${chat.is_pinned ? 'pinned' : ''}" 
             onclick="selectChat(${chat.id})">
          <div class="chat-title">${chat.title}</div>
          <div class="chat-preview">${chat.message_count} сообщений</div>
          <div class="chat-time">${formatTime(chat.last_message_at || chat.created_at)}</div>
        </div>
      `).join('');
    }

    // Выбрать чат
    async function selectChat(chatId) {
      currentChatId = chatId;
      renderChats();
      
      const chat = chats.find(c => c.id === chatId);
      if (chat) {
        document.getElementById('chatTitle').textContent = chat.title;
        document.getElementById('chatModel').textContent = chat.model;
      }
      
      await loadMessages(chatId);
    }

    // Загрузить сообщения
    async function loadMessages(chatId) {
      try {
        const res = await fetch(`${API_URL}/api/ai-chat-folders/chats/${chatId}/messages?userId=${userId}`);
        const data = await res.json();
        
        if (data.success) {
          messages = data.messages;
          renderMessages();
        }
      } catch (error) {
        console.error('Load messages error:', error);
      }
    }

    // Отрисовать сообщения
    function renderMessages() {
      const container = document.getElementById('messagesArea');
      
      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <h3>Начните диалог</h3>
            <p>Напишите первое сообщение</p>
          </div>
        `;
        return;
      }

      container.innerHTML = messages.map(msg => `
        <div class="message message-${msg.role}">
          <div>${msg.content}</div>
          <div class="message-time">${formatTime(msg.created_at)}</div>
        </div>
      `).join('');

      // Прокрутить вниз
      container.scrollTop = container.scrollHeight;
    }

    // Создать новый чат
    async function createNewChat() {
      try {
        const res = await fetch(`${API_URL}/api/ai-chat-folders/chats?userId=${userId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            folder_id: currentFolderId,
            title: 'Новый чат'
          })
        });

        const data = await res.json();
        
        if (data.success) {
          await loadChats();
          selectChat(data.chat.id);
        }
      } catch (error) {
        console.error('Create chat error:', error);
      }
    }

    // Отправить сообщение
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content || !currentChatId) return;

      // Очистить поле
      input.value = '';
      autoResize(input);

      // Добавить сообщение пользователя
      messages.push({
        role: 'user',
        content,
        created_at: new Date().toISOString()
      });
      renderMessages();

      // Показать индикатор печати
      showTypingIndicator();

      try {
        const res = await fetch(`${API_URL}/api/ai-chat-folders/chats/${currentChatId}/messages?userId=${userId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });

        const data = await res.json();
        
        hideTypingIndicator();

        if (data.success) {
          messages.push(data.message);
          renderMessages();
          await loadChats(); // Обновить список чатов
        }
      } catch (error) {
        console.error('Send message error:', error);
        hideTypingIndicator();
      }
    }

    // Показать индикатор печати
    function showTypingIndicator() {
      const container = document.getElementById('messagesArea');
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.id = 'typingIndicator';
      indicator.innerHTML = `
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      `;
      container.appendChild(indicator);
      container.scrollTop = container.scrollHeight;
    }

    // Скрыть индикатор печати
    function hideTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    // Голосовой ввод
    async function toggleVoiceRecording() {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        const audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          await transcribeAudio(audioBlob);
          stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById('voiceBtn').classList.add('recording');
      } catch (error) {
        console.error('Recording error:', error);
        alert('Ошибка доступа к микрофону');
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('voiceBtn').classList.remove('recording');
      }
    }

    async function transcribeAudio(audioBlob) {
      // TODO: Интеграция с API транскрибации
      document.getElementById('messageInput').value = '[Голосовое сообщение]';
    }

    // Вспомогательные функции
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('hidden');
    }

    function showChatMenu() {
      // TODO: Показать меню чата (переименовать, удалить, закрепить)
      alert('Меню чата');
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function formatTime(timestamp) {
      if (!timestamp) return '';
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'только что';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' мин назад';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч назад';
      
      return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    // Инициализация
    init();
  </script>
</body>
</html>
