<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felix Academy - Партнерский кабинет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 30px;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tab {
      padding: 12px 24px;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-light);
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .course-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .course-card:hover {
      transform: translateY(-4px);
    }

    .course-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    .course-content {
      padding: 16px;
    }

    .course-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .course-meta {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      font-size: 14px;
      color: var(--text-light);
    }

    .course-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      flex: 1;
    }

    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .students-list {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .student-item {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .student-item:last-child {
      border-bottom: none;
    }

    .student-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .student-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
    }

    .student-details h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .student-details p {
      font-size: 12px;
      color: var(--text-light);
    }

    .student-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: var(--primary);
      color: white;
    }

    .chat-container {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      height: 600px;
    }

    .chat-list {
      background: var(--card-bg);
      border-radius: 12px;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chat-item {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-item:hover {
      background: var(--bg);
    }

    .chat-item.active {
      background: var(--primary);
      color: white;
    }

    .chat-window {
      background: var(--card-bg);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
    }

    .message.own {
      flex-direction: row-reverse;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--bg);
    }

    .message.own .message-bubble {
      background: var(--primary);
      color: white;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .chat-input {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-success {
      background: var(--success);
      color: white;
    }

    .badge-warning {
      background: var(--warning);
      color: white;
    }

    .badge-danger {
      background: var(--danger);
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .chat-container {
        grid-template-columns: 1fr;
      }

      .chat-list {
        display: none;
      }

      .chat-list.mobile-show {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💼 Партнерский кабинет</h1>
      <p>Управляйте своими курсами и общайтесь со студентами</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')">📊 Обзор</button>
      <button class="tab" onclick="switchTab('courses')">📚 Мои курсы</button>
      <button class="tab" onclick="switchTab('students')">👥 Студенты</button>
      <button class="tab" onclick="switchTab('chats')">💬 Чаты</button>
      <button class="tab" onclick="switchTab('analytics')">📈 Аналитика</button>
    </div>

    <!-- Обзор -->
    <div id="overviewTab" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalCourses">0</div>
          <div class="stat-label">Моих курсов</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalStudents">0</div>
          <div class="stat-label">Студентов</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalEarnings">0₽</div>
          <div class="stat-label">Заработано</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="unreadChats">0</div>
          <div class="stat-label">Непрочитанных</div>
        </div>
      </div>

      <div id="recentActivity"></div>
    </div>

    <!-- Мои курсы -->
    <div id="coursesTab" class="tab-content">
      <div style="margin-bottom: 20px;">
        <button class="btn btn-primary" onclick="createCourse()">
          <span>➕</span>
          <span>Создать курс</span>
        </button>
      </div>
      <div id="coursesContainer" class="courses-grid"></div>
    </div>

    <!-- Студенты -->
    <div id="studentsTab" class="tab-content">
      <div id="studentsContainer" class="students-list"></div>
    </div>

    <!-- Чаты -->
    <div id="chatsTab" class="tab-content">
      <div class="chat-container">
        <div class="chat-list" id="chatsList"></div>
        <div class="chat-window" id="chatWindow">
          <div class="empty-state">
            <div class="empty-state-icon">💬</div>
            <p>Выберите чат для начала общения</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Аналитика -->
    <div id="analyticsTab" class="tab-content">
      <div class="empty-state">
        <div class="empty-state-icon">📈</div>
        <p>Аналитика в разработке</p>
      </div>
    </div>
  </div>

  <script src="js/partner-dashboard.js"></script>
</body>
</html>
