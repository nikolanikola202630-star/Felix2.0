<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Felix Academy V12</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Brandbook Styles -->
  <link rel="stylesheet" href="/miniapp/styles/brandbook-variables.css">
  <link rel="stylesheet" href="/miniapp/css/brandbook-components.css">
  <link rel="stylesheet" href="/miniapp/css/animations.css">
  
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary, #1A1C1E);
      color: var(--text-primary, #F5F5F3);
      overflow-x: hidden;
    }
    
    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(196, 169, 98, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 20px;
      font-size: 14px;
      color: var(--gold);
      font-weight: 500;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.05em;
    }
    
    /* App Container */
    #app {
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    /* Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-gold-light);
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
      border-radius: 12px;
    }
    
    .nav-item.active {
      background: rgba(196, 169, 98, 0.1);
    }
    
    .nav-item span {
      font-size: 24px;
      filter: grayscale(100%);
      transition: filter 0.3s ease;
    }
    
    .nav-item.active span {
      filter: grayscale(0%);
    }
    
    .nav-item p {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.05em;
    }
    
    .nav-item.active p {
      color: var(--gold);
    }
    
    /* Page Container */
    .page {
      display: none;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    
    .page.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Error Message */
    .error-message {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin: 20px;
      color: #ff3b30;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader"></div>
    <p class="loading-text">Загрузка Felix Academy...</p>
  </div>
  
  <!-- App Container -->
  <div id="app">
    <!-- Pages will be loaded here -->
  </div>
  
  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-page="home">
      <span>🏠</span>
      <p>Главная</p>
    </div>
    <div class="nav-item" data-page="catalog">
      <span>📚</span>
      <p>Каталог</p>
    </div>
    <div class="nav-item" data-page="my-courses">
      <span>🎓</span>
      <p>Мои курсы</p>
    </div>
    <div class="nav-item" data-page="profile">
      <span>👤</span>
      <p>Профиль</p>
    </div>
  </nav>
  
  <!-- Core Scripts -->
  <script src="/miniapp/core/utils.js"></script>
  <script src="/miniapp/core/state.js"></script>
  <script src="/miniapp/core/api.js"></script>
  <script src="/miniapp/core/router.js"></script>
  
  <!-- Main App Script -->
  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();
    
    // Global App State
    window.FelixApp = {
      version: '12.0',
      user: null,
      state: null,
      api: null,
      router: null,
      initialized: false
    };
    
    // Initialize App
    async function initApp() {
      try {
        console.log('🚀 Felix Academy V12 - Starting...');
        
        // Get user from Telegram
        const initData = tg.initDataUnsafe;
        if (!initData.user) {
          throw new Error('Не удалось получить данные пользователя Telegram');
        }
        
        FelixApp.user = initData.user;
        console.log('👤 User:', FelixApp.user.first_name);
        
        // Initialize State Manager
        FelixApp.state = new StateManager();
        FelixApp.state.set('user', FelixApp.user);
        
        // Initialize API Client
        FelixApp.api = new APIClient();
        
        // Initialize Router
        FelixApp.router = new Router();
        
        // Setup navigation
        setupNavigation();
        
        // Load initial page
        await FelixApp.router.navigate('home');
        
        // Hide loading screen
        document.getElementById('loading-screen').classList.add('hidden');
        
        FelixApp.initialized = true;
        console.log('✅ App initialized successfully');
        
        // Haptic feedback
        tg.HapticFeedback?.notificationOccurred('success');
        
      } catch (error) {
        console.error('❌ Initialization error:', error);
        showError(error.message);
      }
    }
    
    // Setup Navigation
    function setupNavigation() {
      const navItems = document.querySelectorAll('.nav-item');
      
      navItems.forEach(item => {
        item.addEventListener('click', async () => {
          const page = item.dataset.page;
          
          // Update active state
          navItems.forEach(nav => nav.classList.remove('active'));
          item.classList.add('active');
          
          // Navigate to page
          await FelixApp.router.navigate(page);
          
          // Haptic feedback
          tg.HapticFeedback?.selectionChanged();
        });
      });
    }
    
    // Show Error
    function showError(message) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="error-message">
          <h3>⚠️ Ошибка</h3>
          <p>${message}</p>
          <button onclick="location.reload()" style="margin-top: 12px; padding: 8px 16px; background: #d4af37; border: none; border-radius: 8px; color: #000; font-weight: 600; cursor: pointer;">
            Перезагрузить
          </button>
        </div>
      `;
      document.getElementById('loading-screen').classList.add('hidden');
    }
    
    // Start app when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
