<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGOIST ECOSYSTEM - AI Assistant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-gold: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            
            --bg: #0a0a0f;
            --surface: #1a1a2e;
            --surface-light: #252538;
            --text: #ffffff;
            --text-secondary: #a0a0b8;
            --border: #2a2a3e;
            
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--gradient-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s, visibility 0.8s;
        }

        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .logo-container {
            position: relative;
            margin-bottom: 40px;
        }

        .logo-main {
            font-size: 72px;
            font-weight: 900;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            animation: pulse 2s ease-in-out infinite;
        }

        .logo-subtitle {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-transform: uppercase;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 215, 0, 0.1);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .loading-text {
            color: var(--text-secondary);
            margin-top: 24px;
            font-size: 14px;
            font-weight: 500;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Header */
        .header {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-gold);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 900;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .icon-btn:hover {
            background: var(--surface);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* Navigation */
        .nav {
            background: var(--surface);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-tabs {
            display: flex;
            gap: 12px;
            min-width: min-content;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-tab {
            padding: 12px 24px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .nav-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .nav-tab.active {
            color: white;
            border-color: var(--primary);
        }

        .nav-tab.active::before {
            opacity: 1;
        }

        /* Container */
        .container {
            padding: 24px 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 200px);
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-gradient {
            background: var(--gradient-primary);
            border: none;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .card-gold {
            background: var(--gradient-gold);
            border: none;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-icon {
            font-size: 28px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface-light);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Buttons */
        .btn {
            padding: 16px 28px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .btn-gold {
            background: var(--gradient-gold);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        .slide-in-up {
            animation: slideInUp 0.6s ease-out;
        }

        /* Utilities */
        .hidden {
            display: none !important;
        }

        .mb-16 {
            margin-bottom: 16px;
        }

        .mb-24 {
            margin-bottom: 24px;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .text-center {
            text-align: center;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Shimmer effect */
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        .shimmer {
            background: linear-gradient(
                90deg,
                var(--surface) 0%,
                var(--surface-light) 50%,
                var(--surface) 100%
            );
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="logo-container">
            <div class="logo-main">EGOIST</div>
            <div class="logo-subtitle">ECOSYSTEM</div>
        </div>
        <div class="loader-ring"></div>
        <div class="loading-text">Powered by Felix AI</div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <div class="brand-text">
                    <div class="brand-name">EGOIST</div>
                    <div class="brand-tagline">ECOSYSTEM</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Тема">🌙</button>
                <button class="icon-btn" onclick="showSettings()" title="Настройки">⚙️</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav">
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('home')">🏠 Главная</button>
            <button class="nav-tab" onclick="showTab('academy')">📚 Академия</button>
            <button class="nav-tab" onclick="showTab('notes')">📝 Конспекты</button>
            <button class="nav-tab" onclick="showTab('partners')">🤝 Партнеры</button>
            <button class="nav-tab" onclick="showTab('analytics')">📊 Аналитика</button>
            <button class="nav-tab" onclick="showTab('rating')">🏆 Рейтинг</button>
            <button class="nav-tab" onclick="showTab('profile')">👤 Профиль</button>
        </div>
    </div>

    <!-- Content -->
    <div class="container">
        <!-- Home Tab -->
        <div id="homeTab" class="tab-content">
            <div class="card card-gold slide-in-up">
                <div class="card-header">
                    <div>
                        <div class="card-title">Добро пожаловать в EGOIST!</div>
                        <div style="opacity: 0.9; margin-top: 8px; font-size: 14px;">
                            Твой премиум AI-ассистент готов к работе
                        </div>
                    </div>
                    <div class="card-icon">👋</div>
                </div>
            </div>

            <div class="stats-grid fade-in">
                <div class="stat-card">
                    <div class="stat-value" id="statLevel">1</div>
                    <div class="stat-label">Уровень</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statXP">0</div>
                    <div class="stat-label">Опыт</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statCourses">0</div>
                    <div class="stat-label">Курсов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statAchievements">0</div>
                    <div class="stat-label">Достижений</div>
                </div>
            </div>

            <div class="card fade-in">
                <div class="card-title mb-24">🚀 Быстрые действия</div>
                <button class="btn btn-primary mb-16" onclick="showTab('notes')">
                    <span>🎤</span>
                    <span>Создать конспект</span>
                </button>
                <button class="btn btn-gold mb-16" onclick="showTab('academy')">
                    <span>📚</span>
                    <span>Начать обучение</span>
                </button>
                <button class="btn btn-secondary" onclick="openAI()">
                    <span>🤖</span>
                    <span>Задать вопрос AI</span>
                </button>
            </div>
        </div>

        <!-- Other tabs will be loaded dynamically -->
        <div id="academyTab" class="tab-content hidden"></div>
        <div id="notesTab" class="tab-content hidden"></div>
        <div id="partnersTab" class="tab-content hidden"></div>
        <div id="analyticsTab" class="tab-content hidden"></div>
        <div id="ratingTab" class="tab-content hidden"></div>
        <div id="profileTab" class="tab-content hidden"></div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/voice.js"></script>
</body>
</html>
