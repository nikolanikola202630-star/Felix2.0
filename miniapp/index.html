<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Felix Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            padding: 16px;
        }

        .header {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.7;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 20px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .tab:active {
            opacity: 0.7;
        }

        .tab.active {
            background: var(--tg-theme-button-color, #3390ec);
            opacity: 1;
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        .message.user {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            margin-left: 20%;
        }

        .message.assistant {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            margin-right: 20%;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .button:active {
            opacity: 0.7;
        }

        .button.secondary {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }

        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        .empty {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .toggle {
            width: 50px;
            height: 28px;
            background: #ccc;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: var(--tg-theme-button-color, #3390ec);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle.active::after {
            left: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Felix Bot</h1>
            <p>Умный ассистент с AI</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('history')">История</button>
            <button class="tab" onclick="showTab('stats')">Статистика</button>
            <button class="tab" onclick="showTab('settings')">Настройки</button>
        </div>

        <!-- History Tab -->
        <div id="history" class="content active">
            <div id="historyContent" class="loading">Загрузка...</div>
        </div>

        <!-- Stats Tab -->
        <div id="stats" class="content">
            <div id="statsContent" class="loading">Загрузка...</div>
        </div>

        <!-- Settings Tab -->
        <div id="settings" class="content">
            <div class="setting-item">
                <span>Темная тема</span>
                <div class="toggle" id="themeToggle" onclick="toggleTheme()"></div>
            </div>
            <div class="setting-item">
                <span>Уведомления</span>
                <div class="toggle active" id="notifToggle" onclick="toggleNotifications()"></div>
            </div>
            <div class="setting-item">
                <span>Сохранять историю</span>
                <div class="toggle active" id="historyToggle" onclick="toggleHistory()"></div>
            </div>
            
            <button class="button" onclick="exportData()">📥 Экспорт данных</button>
            <button class="button secondary" onclick="clearHistory()">🗑 Очистить историю</button>
            <button class="button secondary" onclick="sendFeedback()">💬 Обратная связь</button>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Get user data
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id;

        // API base URL
        const API_URL = 'https://felix-black.vercel.app/api';

        // Show tab
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.content').forEach(content => {
                content.classList.remove('active');
            });
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            // Load data for tab
            if (tabName === 'history') loadHistory();
            if (tabName === 'stats') loadStats();
        }

        // Load history
        async function loadHistory() {
            const container = document.getElementById('historyContent');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_URL}/history?userId=${userId}`);
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    container.innerHTML = data.messages.map(msg => `
                        <div class="message ${msg.role}">
                            <div>${msg.content}</div>
                            <div class="message-time">${new Date(msg.created_at).toLocaleString('ru')}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty">История пуста</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="empty">Ошибка загрузки</div>';
            }
        }

        // Load stats
        async function loadStats() {
            const container = document.getElementById('statsContent');
            container.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_URL}/stats?userId=${userId}`);
                const data = await response.json();
                
                container.innerHTML = `
                    <div class="stat-grid">
                        <div class="stat-card">
                            <div class="stat-value">${data.total_messages || 0}</div>
                            <div class="stat-label">Всего сообщений</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.user_messages || 0}</div>
                            <div class="stat-label">Ваших сообщений</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.bot_messages || 0}</div>
                            <div class="stat-label">Ответов бота</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.voice_messages || 0}</div>
                            <div class="stat-label">Голосовых</div>
                        </div>
                    </div>
                    <div class="card" style="margin-top: 16px;">
                        <p><strong>Первое сообщение:</strong> ${data.first_message_at ? new Date(data.first_message_at).toLocaleDateString('ru') : 'Нет данных'}</p>
                        <p style="margin-top: 8px;"><strong>Последнее:</strong> ${data.last_message_at ? new Date(data.last_message_at).toLocaleDateString('ru') : 'Нет данных'}</p>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<div class="empty">Ошибка загрузки</div>';
            }
        }

        // Toggle functions
        function toggleTheme() {
            const toggle = document.getElementById('themeToggle');
            toggle.classList.toggle('active');
            tg.showAlert('Тема будет изменена в следующей версии');
        }

        function toggleNotifications() {
            const toggle = document.getElementById('notifToggle');
            toggle.classList.toggle('active');
        }

        function toggleHistory() {
            const toggle = document.getElementById('historyToggle');
            toggle.classList.toggle('active');
        }

        // Export data
        async function exportData() {
            tg.showPopup({
                title: 'Экспорт данных',
                message: 'Выберите формат экспорта',
                buttons: [
                    {id: 'pdf', type: 'default', text: 'PDF'},
                    {id: 'docx', type: 'default', text: 'DOCX'},
                    {id: 'json', type: 'default', text: 'JSON'},
                    {type: 'cancel'}
                ]
            }, async (buttonId) => {
                if (buttonId && buttonId !== 'cancel') {
                    tg.showAlert(`Экспорт в ${buttonId.toUpperCase()} будет добавлен в следующей версии`);
                }
            });
        }

        // Clear history
        function clearHistory() {
            tg.showConfirm('Вы уверены что хотите очистить всю историю?', async (confirmed) => {
                if (confirmed) {
                    try {
                        await fetch(`${API_URL}/clear?userId=${userId}`, { method: 'POST' });
                        tg.showAlert('История очищена');
                        loadHistory();
                    } catch (error) {
                        tg.showAlert('Ошибка при очистке');
                    }
                }
            });
        }

        // Send feedback
        function sendFeedback() {
            tg.showPopup({
                title: 'Обратная связь',
                message: 'Оцените работу бота',
                buttons: [
                    {id: '5', type: 'default', text: '⭐⭐⭐⭐⭐'},
                    {id: '4', type: 'default', text: '⭐⭐⭐⭐'},
                    {id: '3', type: 'default', text: '⭐⭐⭐'},
                    {type: 'cancel'}
                ]
            }, (buttonId) => {
                if (buttonId && buttonId !== 'cancel') {
                    tg.showAlert('Спасибо за отзыв!');
                }
            });
        }

        // Load initial data
        loadHistory();
    </script>
</body>
</html>
