<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGOIST ACADEMY</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 80px;
    }
    h1 {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background: #1A1A1A;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1F1F1F;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #808080;
      text-decoration: none;
      font-size: 12px;
    }
    .nav-item.active { color: #FFFFFF; }
  </style>
</head>
<body>
  <div class="container">
    <h1>EGOIST ACADEMY</h1>
    <p style="color: #B0B0B0; margin-bottom: 40px;">Добро пожаловать в минималистичную образовательную платформу</p>
    
    <div class="card">
      <h3 style="margin-bottom: 12px;">📚 Курсы</h3>
      <p style="color: #B0B0B0;">5 курсов доступно</p>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 12px;">🤖 AI-Ассистент</h3>
      <p style="color: #B0B0B0;">Помощь 24/7</p>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 12px;">👥 Сообщество</h3>
      <p style="color: #B0B0B0;">Общение с единомышленниками</p>
    </div>
  </div>
  
  <nav class="nav">
    <a class="nav-item active" href="#">
      <div style="font-size: 24px;">🏠</div>
      <div>Главная</div>
    </a>
    <a class="nav-item" href="#">
      <div style="font-size: 24px;">📚</div>
      <div>Каталог</div>
    </a>
    <a class="nav-item" href="#">
      <div style="font-size: 24px;">👥</div>
      <div>Сообщество</div>
    </a>
    <a class="nav-item" href="#">
      <div style="font-size: 24px;">👤</div>
      <div>Профиль</div>
    </a>
  </nav>
  
  <script>
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.setHeaderColor('#0A0A0A');
      window.Telegram.WebApp.setBackgroundColor('#0A0A0A');
    }
  </script>
</body>
</html>
