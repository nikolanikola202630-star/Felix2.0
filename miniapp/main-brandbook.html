<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix Academy — Главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/brandbook-variables.css">
    <link rel="stylesheet" href="css/brandbook-components.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="brandbook-body">
    <div class="container-brandbook">
        <!-- Шапка -->
        <header class="header-brandbook">
            <div class="profile-icon-brandbook">🦁</div>
            <h1 class="logo-brandbook">Felix Academy</h1>
        </header>

        <!-- Приветствие -->
        <section class="welcome-section-brandbook">
            <h2 class="welcome-title-brandbook">Добро пожаловать, <span id="userName">Александр</span>.</h2>
            <p class="welcome-subtitle-brandbook">Мы вас ждали.</p>
        </section>

        <!-- Основные разделы -->
        <section class="main-grid-brandbook">
            <a href="catalog.html" class="card-brandbook card-clickable-brandbook">
                <div class="card-icon-brandbook">🦁</div>
                <h3 class="card-title-brandbook">Академия</h3>
                <p class="card-subtitle-brandbook">12 курсов</p>
            </a>

            <a href="community.html" class="card-brandbook card-clickable-brandbook">
                <div class="card-icon-brandbook">👥</div>
                <h3 class="card-title-brandbook">Сообщество</h3>
                <p class="card-subtitle-brandbook">345</p>
            </a>

            <a href="partner-dashboard-brandbook.html" class="card-brandbook card-clickable-brandbook">
                <div class="card-icon-brandbook">⚜️</div>
                <h3 class="card-title-brandbook">Партнёр</h3>
                <p class="card-subtitle-brandbook">2 450₽</p>
            </a>

            <a href="profile-brandbook.html" class="card-brandbook card-clickable-brandbook">
                <div class="card-icon-brandbook">📜</div>
                <h3 class="card-title-brandbook">Профиль</h3>
                <p class="card-subtitle-brandbook">настройки</p>
            </a>
        </section>

        <!-- Продолжить обучение -->
        <section class="continue-section-brandbook">
            <h3 class="section-title-brandbook">Продолжить обучение</h3>
            <a href="lesson.html" class="progress-card-brandbook">
                <h4 class="progress-title-brandbook">Инвестиции для начинающих</h4>
                <div class="progress-bar-container-brandbook">
                    <div class="progress-bar-brandbook" style="width: 70%"></div>
                </div>
                <p class="progress-text-brandbook">Прогресс: 70%</p>
            </a>
        </section>

        <!-- Голосовой помощник -->
        <div class="voice-fab-brandbook">
            <a href="voice-assistant-brandbook.html" class="record-btn-brandbook">
                🎤
            </a>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            
            // Получаем имя пользователя
            const user = tg.initDataUnsafe?.user;
            if (user?.first_name) {
                document.getElementById('userName').textContent = user.first_name;
            }
        }
    </script>
</body>
</html>
