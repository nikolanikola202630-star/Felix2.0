name: Deploy to Vercel Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Установка Node.js для Prisma и Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      # Установка Python для Backend
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      # Установка зависимостей Backend
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      # Генерация Prisma Client
      - name: Generate Prisma Client
        run: |
          cd backend
          prisma generate
      
      # Установка зависимостей Frontend
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      # Build Frontend (опционально, Vercel сделает сам)
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TELEGRAM_BOT_USERNAME: ${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
      
      # Деплой на Vercel
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
      
      # Уведомление об успешном деплое
      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Frontend: https://your-miniapp.vercel.app"
          echo "Backend: https://your-api.vercel.app"
      
      # Уведомление об ошибке
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs for details"
